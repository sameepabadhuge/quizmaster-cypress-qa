name: Cypress Tests

on:
  push:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Cypress repo
        uses: actions/checkout@v3

      - name: Clone backend
        run: git clone https://github.com/YOUR_USERNAME/QuizMaster-backend.git

      - name: Clone frontend
        run: git clone https://github.com/YOUR_USERNAME/QuizMaster-frontend.git

      # Backend
      - name: Install backend dependencies
        working-directory: QuizMaster-backend
        run: npm install

      - name: Start backend
        working-directory: QuizMaster-backend
        run: npm start &

      # Frontend
      - name: Install frontend dependencies
        working-directory: QuizMaster-frontend
        run: npm install

      - name: Start frontend
        working-directory: QuizMaster-frontend
        run: npm run dev &

      # Wait
      - name: Wait for app
        run: npx wait-on http://localhost:3000

      # Cypress
      - name: Run Cypress tests
        run: npx cypress run