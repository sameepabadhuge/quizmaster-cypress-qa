name: Cypress Tests

on:
  push:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      # Checkout Cypress repo
      - name: Checkout Cypress repo
        uses: actions/checkout@v3

      # Clone frontend
      - name: Clone frontend
        run: git clone https://github.com/sameepabadhuge/QuizMaster-frontend.git frontend

      # Clone backend
      - name: Clone backend
        run: git clone https://github.com/sameepabadhuge/QuizMaster-backend.git backend

      # Install backend dependencies
      - name: Install backend
        run: |
          cd backend
          npm install

      # Install frontend dependencies
      - name: Install frontend
        run: |
          cd frontend
          npm install

      # Run Cypress
      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          start: |
            cd backend && npm start &
            cd frontend && npm run dev
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120